<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudySlice 🍕</title>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
:root{
  --primary:#6C5CE7;
  --break:#00B894;
  --bg:#F5F7FA;
  --card:white;
  --text:#2d3436;
}

body{
  margin:0;
  font-family:'Cairo',sans-serif;
  background:var(--bg);
  display:flex;
  justify-content:center;
}

.app{
  width:100%;
  max-width:420px;
  min-height:100vh;
  background:var(--card);
  display:flex;
  flex-direction:column;
  position:relative;
}

header{
  padding:20px;
  text-align:center;
  font-weight:bold;
  font-size:1.3rem;
  color:var(--primary);
}

.screen{
  flex:1;
  padding:20px;
  display:none;
}

.active{
  display:block;
}

.timer{
  font-size:3rem;
  text-align:center;
  margin:20px 0;
  font-weight:800;
}

.progress{
  height:10px;
  background:#eee;
  border-radius:20px;
  overflow:hidden;
}

.progress-bar{
  height:100%;
  width:100%;
  background:var(--primary);
  transition:1s linear;
}

button{
  padding:12px;
  border:none;
  border-radius:12px;
  font-weight:bold;
  margin-top:15px;
  width:100%;
  cursor:pointer;
}

.primary{
  background:var(--primary);
  color:white;
}

.secondary{
  background:#dfe6e9;
}

.stats-box{
  display:flex;
  justify-content:space-between;
  margin-top:15px;
  font-weight:bold;
}

.task{
  background:#f1f2f6;
  padding:10px;
  border-radius:10px;
  margin:8px 0;
  display:flex;
  justify-content:space-between;
}

.bottom-nav{
  display:flex;
  justify-content:space-around;
  padding:10px;
  border-top:1px solid #eee;
  position:sticky;
  bottom:0;
  background:white;
}

.nav-btn{
  background:none;
  border:none;
  font-size:1.2rem;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="app">

<header>StudySlice 🍕</header>

<!-- Focus Screen -->
<div id="focus" class="screen active">
<div class="progress"><div class="progress-bar" id="bar"></div></div>
<div class="timer" id="time">25:00</div>

<button class="primary" onclick="toggleTimer()" id="startBtn">ابدأ التركيز</button>

<div class="stats-box">
<div>🍕 XP: <span id="xp">0</span></div>
<div>🔥 Streak: <span id="streak">0</span></div>
</div>

<div style="margin-top:15px" id="pizzaBar"></div>
</div>

<!-- Tasks Screen -->
<div id="tasks" class="screen">
<input id="taskInput" placeholder="مهمتك..." style="width:100%;padding:10px;border-radius:10px;border:1px solid #ccc">
<button class="primary" onclick="addTask()">إضافة</button>
<div id="taskList"></div>
</div>

<!-- Stats Screen -->
<div id="stats" class="screen">
<h3>📊 إحصائياتك</h3>
<p>إجمالي الجلسات: <span id="totalSessions">0</span></p>
<p>إجمالي وقت التركيز: <span id="totalTime">0</span> دقيقة</p>
</div>

<!-- Profile Screen -->
<div id="profile" class="screen">
<h3>👤 Player</h3>
<p>Level: <span id="level">1</span></p>
<button class="secondary" onclick="resetAll()">إعادة تعيين البيانات</button>
</div>

<div class="bottom-nav">
<button class="nav-btn" onclick="showScreen('focus')">🏠</button>
<button class="nav-btn" onclick="showScreen('tasks')">🎯</button>
<button class="nav-btn" onclick="showScreen('stats')">📊</button>
<button class="nav-btn" onclick="showScreen('profile')">👤</button>
</div>

</div>

<script>
let focusTime=25*60;
let timeLeft=focusTime;
let timer=null;

let xp=localStorage.getItem("xp")||0;
let streak=localStorage.getItem("streak")||0;
let sessions=localStorage.getItem("sessions")||0;
let totalMinutes=localStorage.getItem("minutes")||0;

document.getElementById("xp").textContent=xp;
document.getElementById("streak").textContent=streak;
document.getElementById("totalSessions").textContent=sessions;
document.getElementById("totalTime").textContent=totalMinutes;
updatePizza();

function updateDisplay(){
let m=Math.floor(timeLeft/60);
let s=timeLeft%60;
document.getElementById("time").textContent=`${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
document.getElementById("bar").style.width=(timeLeft/focusTime)*100+"%";
}

function toggleTimer(){
if(timer==null){
timer=setInterval(()=>{
if(timeLeft>0){
timeLeft--;
updateDisplay();
}else{
clearInterval(timer);
timer=null;
completeSession();
}
},1000);
document.getElementById("startBtn").textContent="إيقاف";
}else{
clearInterval(timer);
timer=null;
document.getElementById("startBtn").textContent="استئناف";
}
}

function completeSession(){
confetti({particleCount:120,spread:70});
xp=parseInt(xp)+50;
streak=parseInt(streak)+1;
sessions=parseInt(sessions)+1;
totalMinutes=parseInt(totalMinutes)+25;

localStorage.setItem("xp",xp);
localStorage.setItem("streak",streak);
localStorage.setItem("sessions",sessions);
localStorage.setItem("minutes",totalMinutes);

document.getElementById("xp").textContent=xp;
document.getElementById("streak").textContent=streak;
document.getElementById("totalSessions").textContent=sessions;
document.getElementById("totalTime").textContent=totalMinutes;

updatePizza();
timeLeft=focusTime;
updateDisplay();
}

function updatePizza(){
let slices=Math.floor(xp/50)%8;
let html="";
for(let i=0;i<8;i++){
html+= i<slices ? "🍕 " : "▫️ ";
}
document.getElementById("pizzaBar").innerHTML=html;
}

function addTask(){
let input=document.getElementById("taskInput");
if(!input.value) return;
let div=document.createElement("div");
div.className="task";
div.innerHTML=`<span>${input.value}</span><span onclick="this.parentElement.remove()">🗑️</span>`;
document.getElementById("taskList").prepend(div);
input.value="";
}

function showScreen(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function resetAll(){
localStorage.clear();
location.reload();
}
</script>

</body>
</html>
